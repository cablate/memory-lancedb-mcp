name: CI

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci

      - name: Smoke test (server starts)
        run: |
          timeout 5 npx tsx server.ts 2>&1 || true
        env:
          EMBEDDING_API_KEY: test-ci-key

      - name: Run tests
        run: npm test
        env:
          EMBEDDING_API_KEY: test-ci-key
