name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the sections below.

  - type: input
    id: version
    attributes:
      label: Package Version
      description: "Check with `npm ls @cablate/memory-lancedb-mcp`"
      placeholder: "e.g. 2.0.0"
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node.js Version
      description: "Run `node --version` to check"
      placeholder: "e.g. v22.0.0"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear description of what happened
      placeholder: "When I use memory_recall with ..., it throws..."
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the issue
      placeholder: |
        1. Set config ...
        2. Call tool ...
        3. See error ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Error Logs / Screenshots
      description: Paste relevant error output or screenshots
      render: shell

  - type: dropdown
    id: embedding
    attributes:
      label: Embedding Provider
      options:
        - OpenAI
        - Jina
        - DeepInfra
        - Gemini
        - Ollama
        - Other
    validations:
      required: false

  - type: input
    id: mcp-client
    attributes:
      label: MCP Client
      placeholder: "e.g. Claude Desktop, Claude Code, Cursor, custom"

  - type: input
    id: os
    attributes:
      label: OS / Platform
      placeholder: "e.g. Ubuntu 24.04, macOS 15, Windows 11"
