<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>Memory Explorer</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

:root {
  --bg: #101114;
  --surface: #18191d;
  --surface-hover: #1e2025;
  --border: #26272c;
  --border-light: #2e3038;
  --text-primary: #eaedf3;
  --text-secondary: #8b8f9e;
  --text-tertiary: #5c5f6e;
  --accent: #4d9ef6;
  --accent-dim: #4d9ef620;
  --danger: #e5604d;
  --warning: #d4a037;
  --success: #3daf6e;
  --purple: #9b7bea;
  --radius: 14px;
  --radius-sm: 8px;
  --font: 'Outfit', -apple-system, sans-serif;
  --mono: 'JetBrains Mono', monospace;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--bg); color: var(--text-primary); font-family: var(--font); font-size: 13px; }

/* Layout — Bento-inspired asymmetric */
.app {
  display: grid;
  grid-template-columns: 1fr 360px;
  grid-template-rows: auto auto 1fr;
  height: 100vh;
  gap: 0;
}

/* Header */
.header {
  grid-column: 1 / -1;
  padding: 18px 28px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
}
.header h1 { font-size: 17px; font-weight: 600; letter-spacing: -0.5px; }
.header .hint { color: var(--text-tertiary); font-size: 12px; letter-spacing: -0.2px; }

/* Toolbar */
.toolbar {
  grid-column: 1 / -1;
  padding: 10px 28px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  display: flex;
  gap: 20px;
  align-items: center;
  flex-wrap: wrap;
}
.tg { display: flex; align-items: center; gap: 8px; }
.tg-label { color: var(--text-tertiary); font-size: 11px; text-transform: uppercase; letter-spacing: 0.8px; font-weight: 500; }
.sep { width: 1px; height: 18px; background: var(--border); }

/* Buttons */
.btn {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text-secondary);
  border-radius: 6px;
  padding: 5px 12px;
  cursor: pointer;
  font-size: 12px;
  font-family: var(--font);
  transition: all 0.15s ease;
  letter-spacing: -0.2px;
}
.btn:hover { background: var(--surface-hover); color: var(--text-primary); }
.btn:active { transform: scale(0.97); }
.btn.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

/* Checkbox labels */
.toolbar label {
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 4px;
  color: var(--text-secondary);
  font-size: 12px;
  transition: color 0.15s;
}
.toolbar label:hover { color: var(--text-primary); }
.toolbar input[type=checkbox] { accent-color: var(--accent); width: 13px; height: 13px; }
.toolbar input[type=range] { accent-color: var(--accent); width: 90px; }
.toolbar select {
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text-secondary);
  border-radius: 4px;
  padding: 4px 8px;
  font-size: 12px;
  font-family: var(--font);
}
.val { color: var(--accent); font-family: var(--mono); font-size: 12px; min-width: 34px; }
.time-label { font-size: 11px; color: var(--text-tertiary); font-family: var(--mono); min-width: 50px; }

/* Main canvas area */
.main { position: relative; overflow: hidden; background: var(--bg); }
#graph { display: block; }

/* Sidebar */
.sidebar {
  border-left: 1px solid var(--border);
  overflow-y: auto;
  background: var(--bg);
}
.sidebar::-webkit-scrollbar { width: 4px; }
.sidebar::-webkit-scrollbar-track { background: transparent; }
.sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* Tabs */
.tabs {
  display: flex;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  position: sticky;
  top: 0;
  z-index: 10;
}
.tab {
  flex: 1;
  padding: 11px 2px;
  text-align: center;
  font-size: 10.5px;
  font-weight: 500;
  letter-spacing: 0.3px;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  color: var(--text-tertiary);
  transition: all 0.15s;
}
.tab:hover { color: var(--text-secondary); }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.tab-content { display: none; padding: 20px; }
.tab-content.active { display: block; }

/* Stat cards — Bento style with varied sizes */
.stat-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
  margin-bottom: 20px;
}
.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 14px 12px;
}
.stat-card .num { font-size: 20px; font-weight: 700; font-family: var(--mono); letter-spacing: -1px; }
.stat-card .label { font-size: 10px; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.4px; margin-top: 2px; }
.stat-card.wide { grid-column: span 2; }

/* Section headers */
.section-title {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-tertiary);
  margin-bottom: 12px;
  margin-top: 24px;
}
.section-title:first-child { margin-top: 0; }

/* Bar chart */
.bar-chart { display: flex; flex-direction: column; gap: 5px; }
.bar-row { display: flex; align-items: center; gap: 8px; }
.bar-label {
  width: 80px;
  text-align: right;
  color: var(--text-tertiary);
  font-size: 11px;
  flex-shrink: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.bar-track { flex: 1; height: 8px; background: var(--surface); border-radius: 4px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 3px; transition: width 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
.bar-num { font-family: var(--mono); font-size: 11px; color: var(--text-tertiary); width: 26px; flex-shrink: 0; }

/* Donut */
.donut-wrap { display: flex; align-items: center; gap: 16px; }
.donut-legend { display: flex; flex-direction: column; gap: 3px; }
.dl-item { display: flex; align-items: center; gap: 6px; font-size: 12px; }
.dl-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.dl-val { font-family: var(--mono); font-weight: 600; }
.dl-pct { color: var(--text-tertiary); font-size: 11px; }

/* Cluster list */
.cluster-list { max-height: calc(100vh - 200px); overflow-y: auto; }
.cluster-list::-webkit-scrollbar { width: 4px; }
.cluster-list::-webkit-scrollbar-track { background: transparent; }
.cluster-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
.cl-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px 10px;
  border-radius: 6px;
  cursor: pointer;
  margin-bottom: 2px;
  transition: background 0.12s;
}
.cl-item:hover { background: var(--surface-hover); }
.cl-item:active { transform: scale(0.99); }
.cl-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.cl-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 12px; }
.cl-count { font-family: var(--mono); font-size: 11px; color: var(--text-tertiary); }

/* Duplicate list */
.dup-list { max-height: calc(100vh - 200px); overflow-y: auto; }
.dup-list::-webkit-scrollbar { width: 4px; }
.dup-list::-webkit-scrollbar-track { background: transparent; }
.dup-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
.dup-item {
  padding: 10px 12px;
  margin-bottom: 4px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all 0.12s;
  border-left: 3px solid var(--danger);
}
.dup-item:hover { background: var(--surface-hover); border-color: var(--border-light); }
.dup-sim { font-family: var(--mono); color: var(--danger); font-size: 11px; font-weight: 600; }
.dup-text { color: var(--text-tertiary); font-size: 11px; margin-top: 4px; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

/* Search */
.search-wrap {
  padding: 12px 20px;
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 39px;
  background: var(--bg);
  z-index: 9;
}
.search-wrap input {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 8px 12px;
  color: var(--text-primary);
  font-size: 13px;
  font-family: var(--font);
  outline: none;
  transition: border-color 0.15s;
}
.search-wrap input:focus { border-color: var(--accent); }
.search-wrap input::placeholder { color: var(--text-tertiary); }

/* Memory items */
.mem-list { padding: 12px 20px; }
.mem-item {
  padding: 10px 12px;
  margin-bottom: 4px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all 0.12s;
  border-left: 3px solid transparent;
}
.mem-item:hover { background: var(--surface-hover); }
.mem-item:active { transform: scale(0.995); }
.mem-item .mc { font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }
.mem-item .mt { font-size: 12px; color: var(--text-secondary); margin-top: 3px; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.mem-item .mm { font-size: 10px; color: var(--text-tertiary); margin-top: 3px; font-family: var(--mono); }

/* Detail panel */
.detail { padding: 20px; }
.detail .close-btn {
  float: right;
  background: none;
  border: 1px solid var(--border);
  color: var(--text-tertiary);
  border-radius: 6px;
  padding: 3px 10px;
  cursor: pointer;
  font-size: 12px;
  font-family: var(--font);
  transition: all 0.12s;
}
.detail .close-btn:hover { color: var(--text-primary); border-color: var(--border-light); }
.detail .d-badge {
  display: inline-block;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  padding: 3px 10px;
  border-radius: 20px;
  font-weight: 600;
  margin-bottom: 8px;
}
.detail .d-cluster { font-size: 11px; margin-bottom: 6px; }
.detail .d-meta { color: var(--text-tertiary); font-size: 11px; font-family: var(--mono); margin-bottom: 12px; }
.detail .d-body { color: var(--text-secondary); font-size: 13px; line-height: 1.7; margin-bottom: 16px; white-space: pre-wrap; word-break: break-word; }
.detail .d-nbrs h4 { font-size: 11px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-tertiary); margin-bottom: 8px; }
.nbr-item {
  padding: 7px 10px;
  margin-bottom: 3px;
  background: var(--surface);
  border-radius: 6px;
  cursor: pointer;
  font-size: 12px;
  line-height: 1.3;
  color: var(--text-tertiary);
  transition: all 0.12s;
}
.nbr-item:hover { background: var(--surface-hover); color: var(--text-secondary); }
.nbr-item .ns { font-family: var(--mono); color: var(--accent); font-size: 11px; }

/* Tooltip */
#tooltip {
  position: fixed;
  background: var(--surface);
  border: 1px solid var(--border-light);
  border-radius: var(--radius);
  padding: 14px 18px;
  max-width: 380px;
  pointer-events: none;
  display: none;
  z-index: 100;
  box-shadow: 0 16px 40px rgba(0,0,0,0.4);
}
#tooltip .tt-badge {
  display: inline-block;
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  padding: 2px 8px;
  border-radius: 20px;
  font-weight: 600;
  margin-bottom: 4px;
}
#tooltip .tt-meta { color: var(--text-tertiary); font-size: 11px; font-family: var(--mono); margin-bottom: 6px; }
#tooltip .tt-text { color: var(--text-secondary); font-size: 12px; line-height: 1.5; max-height: 130px; overflow: hidden; }

/* Playback bar */
.playback {
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--surface);
  border: 1px solid var(--border-light);
  border-radius: var(--radius);
  padding: 10px 20px;
  display: none;
  gap: 12px;
  align-items: center;
  z-index: 20;
  box-shadow: 0 8px 24px rgba(0,0,0,0.3);
}
.playback.visible { display: flex; }
.playback button { background: var(--bg); border: 1px solid var(--border); color: var(--text-secondary); border-radius: 6px; padding: 5px 10px; cursor: pointer; font-size: 14px; transition: all 0.12s; }
.playback button:hover { background: var(--surface-hover); color: var(--text-primary); }
.playback .pb-date { font-family: var(--mono); color: var(--accent); font-weight: 600; min-width: 80px; font-size: 13px; }
.playback .pb-count { color: var(--text-tertiary); font-size: 12px; font-family: var(--mono); }
.playback input[type=range] { width: 200px; accent-color: var(--accent); }

/* Health legend */
.health-legend {
  position: absolute;
  top: 16px;
  left: 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px 16px;
  z-index: 15;
  display: none;
  font-size: 11px;
}
.health-legend.visible { display: block; }
.health-legend h4 { font-size: 10px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-tertiary); margin-bottom: 6px; }
.hl-row { display: flex; align-items: center; gap: 6px; margin: 3px 0; }
.hl-dot { width: 10px; height: 10px; border-radius: 50%; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div>
      <h1>Memory Explorer</h1>
      <span class="hint" id="subtitle"></span>
    </div>
    <span class="hint">Drag nodes / Scroll zoom / Right-click pan</span>
  </div>
  <div class="toolbar" id="toolbar"></div>
  <div class="main">
    <canvas id="graph"></canvas>
    <div id="tooltip"></div>
    <div class="health-legend" id="healthLegend">
      <h4>Access Count</h4>
      <div class="hl-row"><div class="hl-dot" style="background:var(--danger)"></div> 0 (dormant)</div>
      <div class="hl-row"><div class="hl-dot" style="background:var(--warning)"></div> 1-2</div>
      <div class="hl-row"><div class="hl-dot" style="background:#c9a227"></div> 3-5</div>
      <div class="hl-row"><div class="hl-dot" style="background:var(--success)"></div> 6+</div>
    </div>
    <div class="playback" id="playback">
      <button id="pbPlay">&#9654;</button>
      <button id="pbPause" style="display:none">&#10074;&#10074;</button>
      <input type="range" id="pbSlider" min="0" max="100" value="0">
      <span class="pb-date" id="pbDate">-</span>
      <span class="pb-count" id="pbCount"></span>
      <button id="pbClose">&#10005;</button>
    </div>
  </div>
  <div class="sidebar">
    <div class="tabs" id="tabs">
      <div class="tab active" data-tab="charts">Overview</div>
      <div class="tab" data-tab="clusters">Clusters</div>
      <div class="tab" data-tab="dups">Duplicates</div>
      <div class="tab" data-tab="list">All</div>
      <div class="tab" data-tab="detail">Detail</div>
    </div>
    <div id="tab-charts" class="tab-content active"></div>
    <div id="tab-clusters" class="tab-content"></div>
    <div id="tab-dups" class="tab-content"></div>
    <div id="tab-list" class="tab-content">
      <div class="search-wrap"><input id="searchInput" placeholder="Search memories..." /></div>
      <div class="mem-list" id="memList"></div>
    </div>
    <div id="tab-detail" class="tab-content"><div class="detail" id="detailPanel"></div></div>
  </div>
</div>

<script>
const DATA = __MEMORY_DATA__;
window.addEventListener("DOMContentLoaded",()=>init());

const CC = {
  fact:'#4d9ef6', decision:'#e5604d', lesson:'#d4a037',
  skill:'#9b7bea', preference:'#3daf6e', entity:'#7b6eda', other:'#5c5f6e'
};
const CL = {
  fact:'Fact', decision:'Decision', lesson:'Lesson',
  skill:'Skill', preference:'Preference', entity:'Entity', other:'Other'
};
const MCAT_L = {patterns:'Patterns',cases:'Cases',events:'Events'};
const MCAT_C = {patterns:'#9b7bea',cases:'#4d9ef6',events:'#e5604d'};
const CP = ['#4d9ef6','#e5604d','#d4a037','#3daf6e','#9b7bea','#5898d4','#c77a3f','#56b87a','#7b6eda','#c9a227','#6aabdb','#d68f5c','#76c995','#a98edf','#d4b847','#82bae3','#da9f6b','#8ed4a6','#b9a3e5','#dac657'];
function cColor(c){return CP[c%CP.length]}

let nodes=[],gEdges=[],selNode=null,simTh=0.75,catVis={},viewMode='category';
let timeMin=0,timeMax=Infinity,pbActive=false,pbTimer=null,pbIdx=0;
let settled=false,ticks=0;

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function init(){
  const{memories,edges,clusters,clusterInfo,duplicates}=DATA;
  const ts=memories.map(m=>m.timestamp).sort((a,b)=>a-b);
  timeMin=ts[0];timeMax=ts[ts.length-1];
  document.getElementById('subtitle').textContent=
    `${memories.length} memories  ·  ${edges.length} connections  ·  ${Object.keys(clusterInfo).length} clusters  ·  ${duplicates.length} duplicates`;
  buildToolbar(memories);buildCharts(memories,edges,clusterInfo,duplicates);
  buildClusters(clusterInfo);buildDuplicates(duplicates,memories);
  buildList(memories);buildGraph(memories,edges,clusters,clusterInfo);
}

function buildToolbar(memories){
  const el=document.getElementById('toolbar');
  const cats=[...new Set(memories.map(m=>m.category))];
  const ts=memories.map(m=>m.timestamp).sort((a,b)=>a-b);
  const mn=ts[0],mx=ts[ts.length-1];
  const fmt=t=>new Date(t).toLocaleDateString('en',{month:'short',day:'numeric'});
  let h='';
  h+=`<div class="tg"><span class="tg-label">View</span>
    <button class="btn active" id="vCat" onclick="setV('category')">Category</button>
    <button class="btn" id="vHp" onclick="setV('health')">Health</button>
    <button class="btn" id="vCl" onclick="setV('cluster')">Cluster</button>
  </div><div class="sep"></div>`;
  h+=`<div class="tg"><span class="tg-label">Sim</span>
    <input type="range" id="simR" min="55" max="95" value="75">
    <span class="val" id="simV">0.75</span>
  </div><div class="sep"></div>`;
  h+=`<div class="tg"><span class="tg-label">Filter</span>`;
  cats.forEach(c=>{h+=`<label><input type="checkbox" checked data-c="${c}"><span style="color:${CC[c]}">${CL[c]||c}</span></label>`;});
  h+=`</div><div class="sep"></div>`;
  h+=`<div class="tg"><span class="tg-label">Time</span>
    <span class="time-label" id="tfL">${fmt(mn)}</span>
    <input type="range" id="tfR" min="${mn}" max="${mx}" value="${mn}" step="86400000">
    <input type="range" id="ttR" min="${mn}" max="${mx}" value="${mx}" step="86400000">
    <span class="time-label" id="ttL">${fmt(mx)}</span>
  </div><div class="sep"></div>`;
  h+=`<div class="tg"><button class="btn" id="pbBtn" onclick="togglePb()">&#9654; Playback</button></div>`;
  el.innerHTML=h;
  document.getElementById('simR').oninput=e=>{simTh=parseInt(e.target.value)/100;document.getElementById('simV').textContent=simTh.toFixed(2);rst();};
  el.querySelectorAll('[data-c]').forEach(cb=>{cb.onchange=()=>{catVis[cb.dataset.c]=cb.checked;rst();}});
  const fD=t=>new Date(parseInt(t)).toLocaleDateString('en',{month:'short',day:'numeric'});
  document.getElementById('tfR').oninput=e=>{timeMin=parseInt(e.target.value);document.getElementById('tfL').textContent=fD(e.target.value);rst();};
  document.getElementById('ttR').oninput=e=>{timeMax=parseInt(e.target.value);document.getElementById('ttL').textContent=fD(e.target.value);rst();};
}

function setV(m){
  viewMode=m;
  ['vCat','vHp','vCl'].forEach(id=>document.getElementById(id).classList.remove('active'));
  document.getElementById(m==='category'?'vCat':m==='health'?'vHp':'vCl').classList.add('active');
  document.getElementById('healthLegend').classList.toggle('visible',m==='health');
  rst();
}
function rst(){settled=false;ticks=0;}

function buildCharts(memories,edges,clusterInfo,duplicates){
  const el=document.getElementById('tab-charts');
  const catC={};memories.forEach(m=>{catC[m.category]=(catC[m.category]||0)+1;});
  const deg=new Array(memories.length).fill(0);
  edges.forEach(e=>{deg[e.from]++;deg[e.to]++;});
  const avgD=(deg.reduce((a,b)=>a+b,0)/deg.length).toFixed(1);
  const dormant=memories.filter(m=>m.access_count===0).length;
  const impB=[0,0,0,0,0];
  memories.forEach(m=>{const i=m.importance;if(i<0.5)impB[0]++;else if(i<0.6)impB[1]++;else if(i<0.7)impB[2]++;else if(i<0.8)impB[3]++;else impB[4]++;});
  const topC=Object.entries(clusterInfo).sort((a,b)=>b[1].size-a[1].size).slice(0,6);

  el.innerHTML=`
    <div class="stat-grid">
      <div class="stat-card"><div class="num">${memories.length}</div><div class="label">Memories</div></div>
      <div class="stat-card"><div class="num" style="color:var(--accent)">${edges.length}</div><div class="label">Connections</div></div>
      <div class="stat-card"><div class="num" style="color:var(--purple)">${Object.keys(clusterInfo).length}</div><div class="label">Clusters</div></div>
      <div class="stat-card"><div class="num" style="color:var(--danger)">${duplicates.length}</div><div class="label">Duplicates</div></div>
      <div class="stat-card"><div class="num" style="color:var(--success)">${avgD}</div><div class="label">Avg Degree</div></div>
      <div class="stat-card"><div class="num" style="color:var(--warning)">${dormant}</div><div class="label">Dormant</div></div>
    </div>
    <div class="section-title">Category</div>
    <div class="donut-wrap"><canvas id="dCvs" width="96" height="96"></canvas><div class="donut-legend" id="dLeg"></div></div>
    <div class="section-title">Importance</div>
    <div class="bar-chart" id="impBars"></div>
    <div class="section-title">Top Clusters</div>
    <div class="bar-chart" id="tcBars"></div>
  `;

  // Donut
  const cvs=document.getElementById('dCvs'),ctx=cvs.getContext('2d');
  const total=Object.values(catC).reduce((a,b)=>a+b,0);
  const ent=Object.entries(catC).sort((a,b)=>b[1]-a[1]);
  let ang=-Math.PI/2;
  ent.forEach(([c,n])=>{const s=(n/total)*Math.PI*2;ctx.beginPath();ctx.arc(48,48,40,ang,ang+s);ctx.arc(48,48,24,ang+s,ang,true);ctx.closePath();ctx.fillStyle=CC[c]||'#5c5f6e';ctx.fill();ang+=s;});
  ctx.fillStyle=CC.fact;ctx.font='bold 15px JetBrains Mono';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(total,48,48);
  document.getElementById('dLeg').innerHTML=ent.map(([c,n])=>
    `<div class="dl-item"><div class="dl-dot" style="background:${CC[c]}"></div><span style="color:var(--text-secondary)">${CL[c]||c}</span><span class="dl-val">${n}</span><span class="dl-pct">${Math.round(n/total*100)}%</span></div>`
  ).join('');

  const impL=['<0.5','0.5-0.6','0.6-0.7','0.7-0.8','0.8+'];
  const impC=['#5c5f6e','#6e7681','var(--text-secondary)','var(--accent)','var(--danger)'];
  const impMax=Math.max(...impB);
  document.getElementById('impBars').innerHTML=impL.map((l,i)=>
    `<div class="bar-row"><div class="bar-label">${l}</div><div class="bar-track"><div class="bar-fill" style="width:${Math.max(impB[i]/impMax*100,2)}%;background:${impC[i]}"></div></div><div class="bar-num">${impB[i]}</div></div>`
  ).join('');

  const tcM=topC[0]?.[1].size||1;
  document.getElementById('tcBars').innerHTML=topC.map(([id,info])=>
    `<div class="bar-row"><div class="bar-label" title="${esc(info.label)}">${esc(info.label.substring(0,12))}</div><div class="bar-track"><div class="bar-fill" style="width:${info.size/tcM*100}%;background:${cColor(parseInt(id))}"></div></div><div class="bar-num">${info.size}</div></div>`
  ).join('');
}

function buildClusters(ci){
  const el=document.getElementById('tab-clusters');
  const s=Object.entries(ci).sort((a,b)=>b[1].size-a[1].size);
  el.innerHTML=`<div class="section-title">Clusters (${s.length})</div>
    <p style="font-size:11px;color:var(--text-tertiary);margin-bottom:10px">Click to highlight in graph</p>
    <div class="cluster-list">${s.map(([id,info])=>
      `<div class="cl-item" data-cl="${id}"><div class="cl-dot" style="background:${cColor(parseInt(id))}"></div><div class="cl-name" title="${esc(info.label)}">${esc(info.label)}</div><div class="cl-count">${info.size}</div></div>`
    ).join('')}</div>`;
  el.querySelectorAll('.cl-item').forEach(it=>{
    it.onclick=()=>{window._hlSet=new Set(DATA.clusterInfo[it.dataset.cl].members);selNode=null;setV('cluster');};
  });
}

function buildDuplicates(dups,mems){
  const el=document.getElementById('tab-dups');
  const s=[...dups].sort((a,b)=>b.sim-a.sim);
  el.innerHTML=`<div class="section-title">Duplicates (${s.length})</div>
    <p style="font-size:11px;color:var(--text-tertiary);margin-bottom:10px">Similarity >= 0.90 — consider merging</p>
    <div class="dup-list">${s.map(d=>{const a=mems[d.from],b=mems[d.to];
      return `<div class="dup-item" data-f="${d.from}" data-t="${d.to}">
        <div class="dup-sim">${d.sim.toFixed(3)}</div>
        <div class="dup-text">A: ${esc(a.text.substring(0,80))}</div>
        <div class="dup-text">B: ${esc(b.text.substring(0,80))}</div>
      </div>`;
    }).join('')}</div>`;
  el.querySelectorAll('.dup-item').forEach(it=>{
    it.onclick=()=>{const f=parseInt(it.dataset.f),t=parseInt(it.dataset.t);window._hlSet=new Set([f,t]);selNode=f;showDet(f);focusN(f);};
  });
}

function buildList(mems){
  const el=document.getElementById('memList');
  const sorted=[...mems].sort((a,b)=>b.importance-a.importance);
  function render(items){
    el.innerHTML=items.map(m=>{const oi=mems.indexOf(m);const c=CC[m.category]||'#5c5f6e';const d=new Date(m.timestamp).toLocaleDateString('en',{month:'short',day:'numeric'});
      return `<div class="mem-item" data-i="${oi}" style="border-left-color:${c}">
        <span class="mc" style="color:${c}">${CL[m.category]||m.category}</span>
        <div class="mt">${esc(m.text.substring(0,100))}</div>
        <div class="mm">${d} · acc:${m.access_count} · imp:${m.importance}</div>
      </div>`;
    }).join('');
  }
  render(sorted);
  document.getElementById('searchInput').oninput=e=>{const q=e.target.value.toLowerCase();render(q?sorted.filter(m=>m.text.toLowerCase().includes(q)):sorted);};
  el.onclick=e=>{const it=e.target.closest('.mem-item');if(it){const i=parseInt(it.dataset.i);showDet(i);focusN(i);}};
}

function showDet(idx){
  const m=DATA.memories[idx],p=document.getElementById('detailPanel'),c=CC[m.category]||'#5c5f6e';
  const d=new Date(m.timestamp).toLocaleString('en',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
  const cid=DATA.clusters[idx],ci=DATA.clusterInfo[cid];
  const nbrs=[];DATA.edges.forEach(e=>{if(e.from===idx)nbrs.push({i:e.to,s:e.sim});if(e.to===idx)nbrs.push({i:e.from,s:e.sim});});
  nbrs.sort((a,b)=>b.s-a.s);
  p.innerHTML=`<button class="close-btn" onclick="closeDet()">Close</button>
    <div class="d-badge" style="background:${c}18;color:${c}">${CL[m.category]||m.category}</div>
    <div class="d-cluster" style="color:${cColor(cid)}">Cluster: ${esc(ci.label)} (${ci.size})</div>
    <div class="d-meta">${d} · imp:${m.importance} · acc:${m.access_count}</div>
    <div class="d-body">${esc(m.text)}</div>
    <div class="d-nbrs"><h4>Neighbors (${nbrs.length})</h4>
      ${nbrs.slice(0,10).map(n=>{const nm=DATA.memories[n.i];return `<div class="nbr-item" onclick="showDet(${n.i});focusN(${n.i})"><span class="ns">${n.s.toFixed(3)}</span> <span style="color:${CC[nm.category]}">[${CL[nm.category]||nm.category}]</span> ${esc(nm.text.substring(0,70))}</div>`;}).join('')}
    </div>`;
  switchTab('detail');
}
function closeDet(){selNode=null;window._hlSet=null;rst();}

function switchTab(n){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  document.querySelector(`[data-tab="${n}"]`).classList.add('active');
  document.getElementById('tab-'+n).classList.add('active');
}
document.getElementById('tabs').onclick=e=>{const t=e.target.closest('.tab');if(t)switchTab(t.dataset.tab);};

// Playback
function togglePb(){
  pbActive=!pbActive;document.getElementById('playback').classList.toggle('visible',pbActive);
  if(pbActive)startPb();else stopPb();
}
function startPb(){
  const mems=DATA.memories,sorted=[...mems.keys()].sort((a,b)=>mems[a].timestamp-mems[b].timestamp);
  const days=[];let cd='';
  sorted.forEach(i=>{const d=new Date(mems[i].timestamp).toISOString().slice(0,10);if(d!==cd){days.push({d,indices:[]});cd=d;}days[days.length-1].indices.push(i);});
  const sl=document.getElementById('pbSlider');sl.max=days.length-1;pbIdx=0;
  function show(i){if(i>=days.length){stopPb();return;}pbIdx=i;sl.value=i;document.getElementById('pbDate').textContent=days[i].d;
    const vs=new Set();for(let j=0;j<=i;j++)days[j].indices.forEach(x=>vs.add(x));
    document.getElementById('pbCount').textContent=`${vs.size}/${mems.length}`;window._pbVis=vs;rst();}
  show(0);
  pbTimer=setInterval(()=>{pbIdx++;if(pbIdx>=days.length){stopPb();return;}show(pbIdx);},800);
  document.getElementById('pbPlay').style.display='none';document.getElementById('pbPause').style.display='';
  document.getElementById('pbPause').onclick=()=>{clearInterval(pbTimer);document.getElementById('pbPlay').style.display='';document.getElementById('pbPause').style.display='none';};
  document.getElementById('pbPlay').onclick=()=>{pbTimer=setInterval(()=>{pbIdx++;if(pbIdx>=days.length){stopPb();return;}show(pbIdx);},800);document.getElementById('pbPlay').style.display='none';document.getElementById('pbPause').style.display='';};
  sl.oninput=()=>{clearInterval(pbTimer);show(parseInt(sl.value));document.getElementById('pbPlay').style.display='';document.getElementById('pbPause').style.display='none';};
  document.getElementById('pbClose').onclick=()=>{stopPb();togglePb();};
}
function stopPb(){clearInterval(pbTimer);window._pbVis=null;document.getElementById('pbPlay').style.display='';document.getElementById('pbPause').style.display='none';rst();}

// Graph
function buildGraph(mems,edges,clusters,ci){
  const cvs=document.getElementById('graph'),ctx=cvs.getContext('2d');
  let W,H,ox=0,oy=0,sc=1,dragN=null,dragM=false,isP=false,psx,psy;
  function resize(){const r=cvs.parentElement.getBoundingClientRect();W=cvs.width=r.width;H=cvs.height=r.height;rst();}
  resize();window.addEventListener('resize',resize);
  Object.keys(CC).forEach(c=>catVis[c]=true);
  const ucats=[...new Set(mems.map(m=>m.category))];
  const cAngs={};ucats.forEach((c,i)=>{cAngs[c]=(i/ucats.length)*Math.PI*2;});
  nodes=mems.map((m,i)=>{const a=cAngs[m.category]+(Math.random()-0.5)*1.2,d=300+Math.random()*500;
    return{...m,idx:i,x:W/2+Math.cos(a)*d,y:H/2+Math.sin(a)*d,vx:0,vy:0,r:4+m.importance*10};});
  gEdges=edges;

  function vis(n){if(!catVis[n.category])return false;if(n.timestamp<timeMin||n.timestamp>timeMax)return false;if(window._pbVis&&!window._pbVis.has(n.idx))return false;return true;}
  function nCol(n){
    if(viewMode==='health'){if(n.access_count===0)return'#e5604d';if(n.access_count<=2)return'#d4a037';if(n.access_count<=5)return'#c9a227';return'#3daf6e';}
    if(viewMode==='cluster')return cColor(clusters[n.idx]);
    return CC[n.category]||'#5c5f6e';
  }

  function tick(){
    if(!settled){
      const vn=nodes.filter(vis),vs=new Set(vn.map(n=>n.idx));
      const ae=gEdges.filter(e=>e.sim>=simTh&&vs.has(e.from)&&vs.has(e.to));
      for(let i=0;i<vn.length;i++){for(let j=i+1;j<vn.length;j++){
        const a=vn[i],b=vn[j];let dx=a.x-b.x,dy=a.y-b.y,d2=dx*dx+dy*dy;if(d2<1)d2=1;
        let d=Math.sqrt(d2),f=3000/d2;a.vx+=dx/d*f;a.vy+=dy/d*f;b.vx-=dx/d*f;b.vy-=dy/d*f;
      }}
      ae.forEach(e=>{const a=nodes[e.from],b=nodes[e.to];let dx=b.x-a.x,dy=b.y-a.y,d=Math.sqrt(dx*dx+dy*dy)||1;
        let s=(e.sim-simTh)/(1-simTh),f=(d-160)*0.003*(0.3+s*0.7);
        a.vx+=dx/d*f;a.vy+=dy/d*f;b.vx-=dx/d*f;b.vy-=dy/d*f;});
      vn.forEach(n=>{n.vx+=(W/2-n.x)*0.0003;n.vy+=(H/2-n.y)*0.0003;});
      let tv=0;
      vn.forEach(n=>{if(n===dragN)return;n.vx*=0.85;n.vy*=0.85;
        n.vx=Math.max(-8,Math.min(8,n.vx));n.vy=Math.max(-8,Math.min(8,n.vy));
        n.x+=n.vx;n.y+=n.vy;tv+=Math.abs(n.vx)+Math.abs(n.vy);});
      ticks++;if(ticks>350||tv/Math.max(vn.length,1)<0.04)settled=true;
    }
    draw();requestAnimationFrame(tick);
  }

  function draw(){
    ctx.clearRect(0,0,W,H);ctx.save();ctx.translate(ox,oy);ctx.scale(sc,sc);
    const vs=new Set(nodes.filter(vis).map(n=>n.idx));
    const ae=gEdges.filter(e=>e.sim>=simTh&&vs.has(e.from)&&vs.has(e.to));
    const hl=window._hlSet;

    // Cluster bg
    if(viewMode==='cluster'&&!hl){
      const cb={};nodes.forEach(n=>{if(!vs.has(n.idx))return;const c=clusters[n.idx];
        if(!cb[c])cb[c]={mnX:1e9,mnY:1e9,mxX:-1e9,mxY:-1e9,ct:0};
        const b=cb[c];b.mnX=Math.min(b.mnX,n.x);b.mnY=Math.min(b.mnY,n.y);b.mxX=Math.max(b.mxX,n.x);b.mxY=Math.max(b.mxY,n.y);b.ct++;});
      Object.entries(cb).forEach(([id,b])=>{if(b.ct<3)return;const p=35;
        const cx=(b.mnX+b.mxX)/2,cy=(b.mnY+b.mxY)/2,rx=(b.mxX-b.mnX)/2+p,ry=(b.mxY-b.mnY)/2+p;
        ctx.beginPath();ctx.ellipse(cx,cy,Math.max(rx,25),Math.max(ry,25),0,0,Math.PI*2);
        ctx.fillStyle=cColor(parseInt(id))+'0d';ctx.strokeStyle=cColor(parseInt(id))+'25';ctx.lineWidth=1;ctx.fill();ctx.stroke();
        if(DATA.clusterInfo[id]&&DATA.clusterInfo[id].size>=5){ctx.font='11px Outfit,sans-serif';ctx.fillStyle=cColor(parseInt(id))+'70';ctx.textAlign='center';ctx.fillText(DATA.clusterInfo[id].label.substring(0,15),cx,b.mnY-12);}
      });
    }

    // Edges
    ae.forEach(e=>{const a=nodes[e.from],b=nodes[e.to];const s=(e.sim-simTh)/(1-simTh);
      const isHL=selNode!==null&&(e.from===selNode||e.to===selNode);
      const isHLS=hl&&hl.has(e.from)&&hl.has(e.to);
      ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);
      if(isHL||isHLS){ctx.strokeStyle=`rgba(77,158,246,${0.5+s*0.5})`;ctx.lineWidth=2+s*3;}
      else if(selNode!==null||hl){ctx.strokeStyle='rgba(38,39,44,0.2)';ctx.lineWidth=0.5;}
      else{ctx.strokeStyle=`rgba(77,158,246,${0.2+s*0.5})`;ctx.lineWidth=1+s*2.5;}
      ctx.stroke();
    });

    // Nodes
    nodes.forEach(n=>{if(!vs.has(n.idx))return;
      const isSel=n.idx===selNode;
      const isNbr=selNode!==null&&ae.some(e=>(e.from===selNode&&e.to===n.idx)||(e.to===selNode&&e.from===n.idx));
      const isInHL=hl&&hl.has(n.idx);
      const dim=(selNode!==null&&!isSel&&!isNbr)||(hl&&!isInHL);
      ctx.beginPath();ctx.arc(n.x,n.y,n.r,0,Math.PI*2);
      ctx.fillStyle=nCol(n);ctx.globalAlpha=dim?0.08:0.88;ctx.fill();ctx.globalAlpha=1;
      if(isSel){ctx.strokeStyle='#eaedf3';ctx.lineWidth=2.5;ctx.stroke();}
      else if(isNbr||isInHL){ctx.strokeStyle=CC.fact;ctx.lineWidth=1.5;ctx.stroke();}
    });
    ctx.restore();
  }

  function tw(cx,cy){const r=cvs.getBoundingClientRect();return{x:(cx-r.left-ox)/sc,y:(cy-r.top-oy)/sc};}
  function fN(wx,wy){for(let i=nodes.length-1;i>=0;i--){const n=nodes[i];if(!vis(n))continue;const dx=wx-n.x,dy=wy-n.y;if(dx*dx+dy*dy<(n.r+4)*(n.r+4))return n;}return null;}

  const tip=document.getElementById('tooltip');
  cvs.onmousemove=e=>{const w=tw(e.clientX,e.clientY);
    if(isP){ox=e.clientX-psx;oy=e.clientY-psy;return;}
    if(dragN){dragN.x=w.x;dragN.y=w.y;dragM=true;settled=false;ticks=320;return;}
    const f=fN(w.x,w.y);
    if(f){cvs.style.cursor='pointer';const c=nCol(f);const d=new Date(f.timestamp).toLocaleDateString('en',{month:'short',day:'numeric'});const cid=DATA.clusters[f.idx];
      tip.style.display='block';tip.style.left=Math.min(e.clientX+16,innerWidth-400)+'px';tip.style.top=Math.min(e.clientY+16,innerHeight-180)+'px';
      tip.innerHTML=`<div class="tt-badge" style="background:${c}18;color:${c}">${CL[f.category]||f.category}</div>
        <div class="tt-meta">${d} · imp:${f.importance} · acc:${f.access_count} · ${esc(DATA.clusterInfo[cid].label.substring(0,20))}</div>
        <div class="tt-text">${esc(f.text.substring(0,180))}${f.text.length>180?'...':''}</div>`;
    }else{cvs.style.cursor='default';tip.style.display='none';}
  };
  cvs.onmousedown=e=>{if(e.button===2){isP=true;psx=e.clientX-ox;psy=e.clientY-oy;e.preventDefault();return;}
    const w=tw(e.clientX,e.clientY),f=fN(w.x,w.y);if(f){dragN=f;dragM=false;}else{selNode=null;window._hlSet=null;rst();}};
  cvs.onmouseup=()=>{if(dragN&&!dragM){selNode=dragN.idx;showDet(dragN.idx);rst();}dragN=null;isP=false;};
  cvs.oncontextmenu=e=>e.preventDefault();
  cvs.onwheel=e=>{e.preventDefault();const z=e.deltaY>0?0.92:1.08;const r=cvs.getBoundingClientRect();
    const mx=e.clientX-r.left,my=e.clientY-r.top;ox=mx-(mx-ox)*z;oy=my-(my-oy)*z;sc*=z;};

  window.focusN=function(i){selNode=i;const n=nodes[i],r=cvs.getBoundingClientRect();ox=r.width/2-n.x*sc;oy=r.height/2-n.y*sc;rst();ticks=320;};
  tick();
}
</script>
</body>
